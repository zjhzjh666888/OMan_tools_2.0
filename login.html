<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OTOOLS - 登录 / 注册</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Montserrat:wght@600;700;800&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; }
    body {
      font-family: 'Inter', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: #0a0e1a;
      color: #f0f0f0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* 粒子星空画布 */
    #particle-canvas {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 0;
    }

    /* 登录容器 */
    .auth-container {
      position: relative;
      z-index: 10;
      width: 420px;
      max-width: 92vw;
      background: rgba(16, 20, 38, 0.82);
      backdrop-filter: blur(20px) saturate(1.4);
      -webkit-backdrop-filter: blur(20px) saturate(1.4);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 24px;
      padding: 40px 36px;
      box-shadow:
        0 24px 80px rgba(0, 0, 0, 0.5),
        0 0 60px rgba(99, 102, 241, 0.08),
        inset 0 1px 0 rgba(255, 255, 255, 0.06);
      animation: fadeInUp 0.6s ease-out;
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(30px) scale(0.96); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    .auth-brand {
      text-align: center;
      margin-bottom: 28px;
    }
    .auth-brand h1 {
      font-family: 'Montserrat', sans-serif;
      font-size: 32px;
      font-weight: 800;
      background: linear-gradient(135deg, #6366f1, #a855f7, #ec4899);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.02em;
    }
    .auth-brand p {
      margin-top: 6px;
      font-size: 13px;
      color: rgba(255, 255, 255, 0.5);
    }

    /* 切换 Tab */
    .auth-tabs {
      display: flex;
      margin-bottom: 24px;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.08);
    }
    .auth-tab {
      flex: 1;
      padding: 12px 0;
      text-align: center;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      background: transparent;
      color: rgba(255, 255, 255, 0.5);
      border: none;
      transition: all 0.3s ease;
    }
    .auth-tab.active {
      background: linear-gradient(135deg, rgba(99, 102, 241, 0.3), rgba(168, 85, 247, 0.2));
      color: #fff;
      box-shadow: 0 0 20px rgba(99, 102, 241, 0.15);
    }
    .auth-tab:hover:not(.active) {
      color: rgba(255, 255, 255, 0.8);
      background: rgba(255, 255, 255, 0.04);
    }

    /* 表单 */
    .auth-form { display: flex; flex-direction: column; gap: 16px; }
    .form-group { position: relative; }
    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: rgba(255, 255, 255, 0.6);
      margin-bottom: 6px;
    }
    .form-group input {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.04);
      color: #f0f0f0;
      font-size: 15px;
      outline: none;
      transition: all 0.3s ease;
      font-family: inherit;
    }
    .form-group input::placeholder { color: rgba(255, 255, 255, 0.3); }
    .form-group input:focus {
      border-color: rgba(99, 102, 241, 0.5);
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1), 0 0 20px rgba(99, 102, 241, 0.08);
      background: rgba(255, 255, 255, 0.06);
    }

    .email-hint {
      font-size: 11px;
      color: rgba(168, 85, 247, 0.8);
      margin-top: 4px;
    }

    .submit-btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 12px;
      background: linear-gradient(135deg, #6366f1, #a855f7);
      color: #fff;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-top: 4px;
      letter-spacing: 0.02em;
    }
    .submit-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(99, 102, 241, 0.3), 0 0 40px rgba(168, 85, 247, 0.15);
    }
    .submit-btn:active { transform: translateY(0); }
    .submit-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    /* 消息提示 */
    .auth-message {
      padding: 10px 14px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 500;
      text-align: center;
      animation: fadeInUp 0.3s ease-out;
    }
    .auth-message.error {
      background: rgba(239, 68, 68, 0.12);
      color: #f87171;
      border: 1px solid rgba(239, 68, 68, 0.2);
    }
    .auth-message.success {
      background: rgba(34, 197, 94, 0.12);
      color: #4ade80;
      border: 1px solid rgba(34, 197, 94, 0.2);
    }

    /* 头像选择模态框 */
    .avatar-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(8px);
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: fadeInUp 0.3s ease-out;
    }
    .avatar-modal {
      background: rgba(16, 20, 38, 0.95);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 24px;
      padding: 36px;
      width: 480px;
      max-width: 92vw;
      max-height: 80vh;
      overflow-y: auto;
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.6);
    }
    .avatar-modal h2 {
      font-size: 22px;
      font-weight: 700;
      text-align: center;
      margin-bottom: 8px;
      background: linear-gradient(135deg, #6366f1, #ec4899);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .avatar-modal p {
      text-align: center;
      font-size: 13px;
      color: rgba(255, 255, 255, 0.5);
      margin-bottom: 24px;
    }
    .avatar-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin-bottom: 24px;
    }
    .avatar-item {
      aspect-ratio: 1;
      border-radius: 50%;
      border: 3px solid transparent;
      cursor: pointer;
      overflow: hidden;
      transition: all 0.3s ease;
      background: rgba(255, 255, 255, 0.05);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .avatar-item:hover {
      border-color: rgba(99, 102, 241, 0.5);
      transform: scale(1.1);
      box-shadow: 0 0 20px rgba(99, 102, 241, 0.2);
    }
    .avatar-item.selected {
      border-color: #a855f7;
      box-shadow: 0 0 24px rgba(168, 85, 247, 0.4);
      transform: scale(1.08);
    }
    .avatar-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .avatar-confirm-btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 12px;
      background: linear-gradient(135deg, #6366f1, #a855f7);
      color: #fff;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    .avatar-confirm-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(99, 102, 241, 0.3);
    }
    .avatar-confirm-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .avatar-skip {
      display: block;
      width: 100%;
      text-align: center;
      margin-top: 12px;
      font-size: 13px;
      color: rgba(255, 255, 255, 0.4);
      cursor: pointer;
      border: none;
      background: none;
      transition: color 0.2s;
    }
    .avatar-skip:hover { color: rgba(255, 255, 255, 0.7); }

    /* 响应式 */
    @media (max-width: 500px) {
      .auth-container { padding: 28px 20px; }
      .avatar-grid { grid-template-columns: repeat(3, 1fr); gap: 12px; }
      .avatar-modal { padding: 24px 16px; }
    }
  </style>
</head>
<body>

<canvas id="particle-canvas"></canvas>

<div class="auth-container" id="authContainer">
  <div class="auth-brand">
    <h1>OTOOLS</h1>
    <p>WavePeak Elite | AI效率导航</p>
  </div>

  <div class="auth-tabs">
    <button class="auth-tab active" id="tabLogin" onclick="switchTab('login')">登录</button>
    <button class="auth-tab" id="tabRegister" onclick="switchTab('register')">注册</button>
  </div>

  <!-- 登录表单 -->
  <form class="auth-form" id="loginForm" onsubmit="handleLogin(event)">
    <div class="form-group">
      <label>QQ邮箱</label>
      <input type="email" id="loginEmail" placeholder="输入你的QQ邮箱" required />
    </div>
    <div class="form-group">
      <label>密码</label>
      <input type="password" id="loginPassword" placeholder="输入密码" required />
    </div>
    <div id="loginMsg"></div>
    <button type="submit" class="submit-btn" id="loginBtn">登 录</button>
  </form>

  <!-- 注册表单 -->
  <form class="auth-form" id="registerForm" style="display:none" onsubmit="handleRegister(event)">
    <div class="form-group">
      <label>QQ邮箱</label>
      <input type="email" id="regEmail" placeholder="仅支持QQ邮箱注册" required />
      <div class="email-hint">* 仅支持 @qq.com 邮箱</div>
    </div>
    <div class="form-group">
      <label>昵称</label>
      <input type="text" id="regNickname" placeholder="2-20个字符" required minlength="2" maxlength="20" />
    </div>
    <div class="form-group">
      <label>密码</label>
      <input type="password" id="regPassword" placeholder="至少6位" required minlength="6" />
    </div>
    <div class="form-group">
      <label>确认密码</label>
      <input type="password" id="regPasswordConfirm" placeholder="再次输入密码" required />
    </div>
    <div id="regMsg"></div>
    <button type="submit" class="submit-btn" id="regBtn">注 册</button>
  </form>
</div>

<!-- 头像领取弹窗 -->
<div class="avatar-overlay" id="avatarOverlay" style="display:none">
  <div class="avatar-modal">
    <h2>🎉 注册成功！领取你的专属头像</h2>
    <p>选一个喜欢的头像作为你的身份标识吧</p>
    <div class="avatar-grid" id="avatarGrid"></div>
    <button class="avatar-confirm-btn" id="avatarConfirmBtn" onclick="confirmAvatar()" disabled>确认领取</button>
    <button class="avatar-skip" onclick="skipAvatar()">稍后再说，先进入网站 →</button>
  </div>
</div>

<script>
  // ========== API 地址 ==========
  const API_BASE = (location.hostname === 'localhost' || location.hostname === '127.0.0.1')
    ? `${location.protocol}//${location.hostname}:3000`
    : '';

  // ========== 粒子星空动画 ==========
  const canvas = document.getElementById('particle-canvas');
  const ctx = canvas.getContext('2d');
  let particles = [];
  let mouse = { x: -1000, y: -1000 };
  let animId;

  function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  resizeCanvas();
  window.addEventListener('resize', resizeCanvas);

  class Particle {
    constructor() {
      this.reset();
    }
    reset() {
      this.x = Math.random() * canvas.width;
      this.y = Math.random() * canvas.height;
      this.size = Math.random() * 2 + 0.5;
      this.speedX = (Math.random() - 0.5) * 0.4;
      this.speedY = (Math.random() - 0.5) * 0.4;
      this.opacity = Math.random() * 0.6 + 0.2;
      this.twinkleSpeed = Math.random() * 0.02 + 0.005;
      this.twinklePhase = Math.random() * Math.PI * 2;
      this.hue = Math.random() > 0.7 ? (220 + Math.random() * 60) : (0);
    }
    update() {
      this.x += this.speedX;
      this.y += this.speedY;
      this.twinklePhase += this.twinkleSpeed;

      // 鼠标交互：远离鼠标
      const dx = this.x - mouse.x;
      const dy = this.y - mouse.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < 120) {
        const force = (120 - dist) / 120;
        this.x += (dx / dist) * force * 2;
        this.y += (dy / dist) * force * 2;
      }

      // 边界循环
      if (this.x < -10) this.x = canvas.width + 10;
      if (this.x > canvas.width + 10) this.x = -10;
      if (this.y < -10) this.y = canvas.height + 10;
      if (this.y > canvas.height + 10) this.y = -10;
    }
    draw() {
      const twinkle = 0.5 + 0.5 * Math.sin(this.twinklePhase);
      const alpha = this.opacity * twinkle;
      if (this.hue > 0) {
        ctx.fillStyle = `hsla(${this.hue}, 70%, 70%, ${alpha})`;
      } else {
        ctx.fillStyle = `rgba(255, 255, 255, ${alpha})`;
      }
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  function initParticles() {
    const count = Math.min(Math.floor((canvas.width * canvas.height) / 4000), 400);
    particles = [];
    for (let i = 0; i < count; i++) {
      particles.push(new Particle());
    }
  }

  function drawConnections() {
    for (let i = 0; i < particles.length; i++) {
      for (let j = i + 1; j < particles.length; j++) {
        const dx = particles[i].x - particles[j].x;
        const dy = particles[i].y - particles[j].y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < 100) {
          const alpha = (1 - dist / 100) * 0.15;
          ctx.strokeStyle = `rgba(99, 102, 241, ${alpha})`;
          ctx.lineWidth = 0.5;
          ctx.beginPath();
          ctx.moveTo(particles[i].x, particles[i].y);
          ctx.lineTo(particles[j].x, particles[j].y);
          ctx.stroke();
        }
      }
    }
  }

  // 流星
  let meteors = [];
  function spawnMeteor() {
    meteors.push({
      x: Math.random() * canvas.width,
      y: 0,
      length: 60 + Math.random() * 80,
      speed: 4 + Math.random() * 6,
      angle: Math.PI / 4 + (Math.random() - 0.5) * 0.3,
      opacity: 0.8,
      trail: []
    });
  }

  function updateMeteors() {
    meteors = meteors.filter(m => {
      m.x += Math.cos(m.angle) * m.speed;
      m.y += Math.sin(m.angle) * m.speed;
      m.opacity -= 0.008;
      m.trail.push({ x: m.x, y: m.y });
      if (m.trail.length > 20) m.trail.shift();

      if (m.opacity > 0) {
        ctx.beginPath();
        const gradient = ctx.createLinearGradient(
          m.x - Math.cos(m.angle) * m.length, m.y - Math.sin(m.angle) * m.length,
          m.x, m.y
        );
        gradient.addColorStop(0, `rgba(255, 255, 255, 0)`);
        gradient.addColorStop(1, `rgba(255, 255, 255, ${m.opacity})`);
        ctx.strokeStyle = gradient;
        ctx.lineWidth = 1.5;
        ctx.moveTo(m.x - Math.cos(m.angle) * m.length, m.y - Math.sin(m.angle) * m.length);
        ctx.lineTo(m.x, m.y);
        ctx.stroke();
      }

      return m.opacity > 0 && m.x < canvas.width + 100 && m.y < canvas.height + 100;
    });
  }

  function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // 深空背景渐变
    const bgGrad = ctx.createRadialGradient(
      canvas.width / 2, canvas.height / 2, 0,
      canvas.width / 2, canvas.height / 2, canvas.width * 0.7
    );
    bgGrad.addColorStop(0, '#0f1629');
    bgGrad.addColorStop(1, '#060a14');
    ctx.fillStyle = bgGrad;
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    particles.forEach(p => { p.update(); p.draw(); });
    drawConnections();
    updateMeteors();

    animId = requestAnimationFrame(animate);
  }

  initParticles();
  animate();
  setInterval(spawnMeteor, 2500);

  canvas.addEventListener('mousemove', (e) => {
    mouse.x = e.clientX;
    mouse.y = e.clientY;
  });
  canvas.addEventListener('mouseleave', () => {
    mouse.x = -1000;
    mouse.y = -1000;
  });

  // ========== 认证逻辑 ==========
  let currentToken = null;
  let currentAvatars = [];
  let selectedAvatar = '';

  function switchTab(tab) {
    document.getElementById('loginForm').style.display = tab === 'login' ? 'flex' : 'none';
    document.getElementById('registerForm').style.display = tab === 'register' ? 'flex' : 'none';
    document.getElementById('tabLogin').classList.toggle('active', tab === 'login');
    document.getElementById('tabRegister').classList.toggle('active', tab === 'register');
    clearMessages();
  }

  function showMessage(elementId, text, type) {
    const el = document.getElementById(elementId);
    el.innerHTML = `<div class="auth-message ${type}">${text}</div>`;
  }

  function clearMessages() {
    document.getElementById('loginMsg').innerHTML = '';
    document.getElementById('regMsg').innerHTML = '';
  }

  async function handleLogin(e) {
    e.preventDefault();
    const email = document.getElementById('loginEmail').value.trim();
    const password = document.getElementById('loginPassword').value;
    const btn = document.getElementById('loginBtn');

    btn.disabled = true;
    btn.textContent = '登录中...';
    clearMessages();

    try {
      const resp = await fetch(`${API_BASE}/api/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });
      const data = await resp.json();

      if (!resp.ok) {
        showMessage('loginMsg', data.error || '登录失败', 'error');
        return;
      }

      localStorage.setItem('token', data.token);
      localStorage.setItem('user', JSON.stringify(data.user));
      showMessage('loginMsg', '登录成功，正在跳转...', 'success');
      setTimeout(() => { window.location.href = 'index.html'; }, 800);
    } catch (err) {
      showMessage('loginMsg', '网络错误，请确保后端服务已启动', 'error');
    } finally {
      btn.disabled = false;
      btn.textContent = '登 录';
    }
  }

  async function handleRegister(e) {
    e.preventDefault();
    const email = document.getElementById('regEmail').value.trim();
    const nickname = document.getElementById('regNickname').value.trim();
    const password = document.getElementById('regPassword').value;
    const confirm = document.getElementById('regPasswordConfirm').value;
    const btn = document.getElementById('regBtn');

    clearMessages();

    // 前端校验
    if (!/@qq\.com$/i.test(email)) {
      showMessage('regMsg', '仅支持QQ邮箱注册（xxx@qq.com）', 'error');
      return;
    }
    if (password !== confirm) {
      showMessage('regMsg', '两次密码输入不一致', 'error');
      return;
    }
    if (password.length < 6) {
      showMessage('regMsg', '密码至少6位', 'error');
      return;
    }

    btn.disabled = true;
    btn.textContent = '注册中...';

    try {
      const resp = await fetch(`${API_BASE}/api/register`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password, nickname })
      });
      const data = await resp.json();

      if (!resp.ok) {
        showMessage('regMsg', data.error || '注册失败', 'error');
        return;
      }

      currentToken = data.token;
      localStorage.setItem('token', data.token);
      localStorage.setItem('user', JSON.stringify(data.user));

      // 显示头像领取
      if (data.avatars && data.avatars.length > 0) {
        currentAvatars = data.avatars;
        showAvatarPicker(data.avatars);
      } else {
        showMessage('regMsg', '注册成功，正在跳转...', 'success');
        setTimeout(() => { window.location.href = 'index.html'; }, 800);
      }
    } catch (err) {
      showMessage('regMsg', '网络错误，请确保后端服务已启动', 'error');
    } finally {
      btn.disabled = false;
      btn.textContent = '注 册';
    }
  }

  function showAvatarPicker(avatars) {
    const overlay = document.getElementById('avatarOverlay');
    const grid = document.getElementById('avatarGrid');
    grid.innerHTML = '';

    avatars.forEach((url, idx) => {
      const div = document.createElement('div');
      div.className = 'avatar-item';
      div.innerHTML = `<img src="${url}" alt="头像${idx + 1}" />`;
      div.onclick = () => selectAvatar(url, div);
      grid.appendChild(div);
    });

    overlay.style.display = 'flex';
    selectedAvatar = '';
    document.getElementById('avatarConfirmBtn').disabled = true;
  }

  function selectAvatar(url, el) {
    document.querySelectorAll('.avatar-item').forEach(item => item.classList.remove('selected'));
    el.classList.add('selected');
    selectedAvatar = url;
    document.getElementById('avatarConfirmBtn').disabled = false;
  }

  async function confirmAvatar() {
    if (!selectedAvatar) return;
    const btn = document.getElementById('avatarConfirmBtn');
    btn.disabled = true;
    btn.textContent = '领取中...';

    try {
      const token = currentToken || localStorage.getItem('token');
      const resp = await fetch(`${API_BASE}/api/avatar`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${token}`
        },
        body: JSON.stringify({ avatar: selectedAvatar })
      });
      const data = await resp.json();

      if (resp.ok) {
        const user = JSON.parse(localStorage.getItem('user') || '{}');
        user.avatar = selectedAvatar;
        localStorage.setItem('user', JSON.stringify(user));
      }
    } catch (err) {
      // 即使失败也跳转
    }

    window.location.href = 'index.html';
  }

  function skipAvatar() {
    window.location.href = 'index.html';
  }

  // 已登录用户自动跳转
  (function checkAuth() {
    const token = localStorage.getItem('token');
    if (token) {
      window.location.href = 'index.html';
